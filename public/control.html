<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenview Control</title>
  <link rel="stylesheet" href="css/control.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Screenview</h1>
      <div class="header-right">
        <div class="mpv-status" id="mpvStatus" hidden>mpv disconnected</div>
        <div class="status" id="status">Connecting…</div>
      </div>
    </header>

    <main class="main">
      <section class="panel library-panel">
        <h2>Media Library</h2>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.mp4,.webm,.mkv,.avi,.mov,.m4v">
          <p>Drop files here or click to upload</p>
        </div>
        <div class="upload-progress" id="uploadProgress"></div>
        <div class="library-grid" id="libraryGrid"></div>
        <div class="disk-space" id="diskSpace">—</div>
      </section>

      <section class="panel playlist-panel">
        <h2>Playlist</h2>
        <div class="playback-controls">
          <button class="btn btn-go" id="btnGo" disabled>GO</button>
          <button class="btn btn-stop" id="btnStop">STOP</button>
          <button class="btn btn-loop" id="btnLoop" title="Loop playlist">↻ Loop</button>
        </div>
        <div class="cue-list" id="cueList"></div>
      </section>
    </main>

    <div class="cue-popup-backdrop" id="cuePopupBackdrop" hidden>
      <div class="cue-popup" id="cuePopup">
        <div class="cue-popup-inner">
        <label>
          <input type="checkbox" id="popupLoop"> Loop (video)
        </label>
        <label>
          Display:
          <select id="popupDisplayMode">
            <option value="stretch">Stretch</option>
            <option value="centered">Centered</option>
            <option value="fill">Fill</option>
          </select>
        </label>
        <label>
          Duration (sec):
          <input type="number" id="popupDuration" min="0" step="1" placeholder="Hold">
          <input type="checkbox" id="popupHold"> Hold
        </label>
        </div>
        <div class="cue-popup-actions">
          <button type="button" class="btn btn-cancel" id="popupCancel">Cancel</button>
          <button type="button" class="btn btn-save" id="popupSave">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/control.js"></script>
</body>
</html>
