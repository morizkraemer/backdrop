<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenview Control</title>
  <link rel="stylesheet" href="css/control.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Screenview</h1>
      <div class="header-right">
        <div class="mpv-status" id="mpvStatus" hidden>mpv disconnected</div>
        <div class="status" id="status">Connecting…</div>
      </div>
    </header>

    <main class="main">
      <div class="upload-progress" id="uploadProgress"></div>
      <section class="panel library-panel" id="libraryPanel">
        <div class="library-header">
          <h2>Media Library</h2>
          <button type="button" class="btn-add" id="btnAddLibrary" title="Add media">+</button>
        </div>
        <button type="button" class="btn-collapse" id="btnCollapseLibrary" title="Collapse library" aria-label="Collapse media library" aria-expanded="true"></button>
        <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.mp4,.webm,.mkv,.avi,.mov,.m4v" hidden>
        <div class="library-drop-zone" id="libraryDropZone">
          <input type="search" class="library-search" id="librarySearch" placeholder="Search media…" aria-label="Search media library">
          <div class="library-list" id="libraryList"></div>
        </div>
        <div class="disk-space" id="diskSpace">—</div>
      </section>

      <section class="panel playlist-panel">
        <div class="playlist-header">
          <h2>Playlist</h2>
          <button type="button" class="btn-add" id="btnAddPlaylist" title="Add file to playlist (not library)">+</button>
        </div>
        <input type="file" id="playlistFileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.mp4,.webm,.mkv,.avi,.mov,.m4v" hidden>
        <div class="playback-controls">
          <button class="btn btn-go" id="btnGo" disabled>GO</button>
          <button class="btn btn-stop" id="btnStop">STOP</button>
          <button class="btn btn-loop" id="btnLoop" title="Loop playlist" aria-pressed="false">↻ Loop</button>
        </div>
        <div class="cue-drop-zone" id="cueDropZone">
          <div class="cue-list" id="cueList"></div>
        </div>
      </section>
    </main>

    <div class="cue-popup-backdrop" id="cuePopupBackdrop" hidden aria-hidden="true">
      <div class="cue-popup" id="cuePopup" role="dialog" aria-modal="true" aria-label="Cue settings" tabindex="-1">
        <div class="cue-popup-inner">
        <label>
          <input type="checkbox" id="popupLoop"> Loop (video)
        </label>
        <label>
          Display:
          <select id="popupDisplayMode">
            <option value="stretch">Stretch</option>
            <option value="centered">Centered</option>
            <option value="fill">Fill</option>
          </select>
        </label>
        <label>
          Duration (sec):
          <input type="number" id="popupDuration" min="0" step="1" placeholder="Hold">
          <input type="checkbox" id="popupHold"> Hold
        </label>
        </div>
        <div class="cue-popup-actions">
          <button type="button" class="btn btn-cancel" id="popupCancel">Cancel</button>
          <button type="button" class="btn btn-save" id="popupSave">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/control.js"></script>
</body>
</html>
